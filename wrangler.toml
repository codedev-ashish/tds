name = "tds"
compatibility_date = "2026-04-10"

# This tells Cloudflare where your built website files are
[assets]
directory = "./dist"

[[d1_databases]]
binding = "DB"
database_name = "tds_pro_db"
database_id = "403ece79-b25b-4984-9122-52918f2bda65"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
